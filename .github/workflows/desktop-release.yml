name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-contract:
    name: Release Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate package versions and tag
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const rootPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const desktopPackage = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8'));
          if (rootPackage.version !== desktopPackage.version) {
            throw new Error(`Root version ${rootPackage.version} does not match desktop version ${desktopPackage.version}`);
          }

          const ref = process.env.GITHUB_REF ?? '';
          if (!ref.startsWith('refs/tags/')) process.exit(0);

          const tag = process.env.GITHUB_REF_NAME ?? '';
          const version = rootPackage.version;
          const parts = version.split('.');
          if (parts.length !== 3 || parts.some((part) => !/^\d+$/.test(part))) {
            throw new Error(`Package version must be semver-like X.Y.Z, got ${version}`);
          }

          const expectedTags = new Set([`v${version}`]);
          if (parts[2] === '0') expectedTags.add(`v${parts[0]}.${parts[1]}`);
          if (!expectedTags.has(tag)) {
            throw new Error(`Tag ${tag} does not match package version ${version}; expected ${[...expectedTags].join(' or ')}`);
          }
          NODE

  quality:
    name: Quality Gate
    needs: release-contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fast quality gate
        run: pnpm quality:fast

  build-linux:
    name: Build Linux
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @zorid/desktop-app run build

      - name: Package Linux artifacts
        run: pnpm --filter @zorid/desktop-app exec electron-builder --linux AppImage deb tar.gz --x64 --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @zorid/desktop-app run build

      - name: Package Windows artifacts
        run: pnpm --filter @zorid/desktop-app exec electron-builder --win msi zip --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            apps/desktop/release/*.msi
            apps/desktop/release/*.zip
          if-no-files-found: error

  build-macos:
    name: Build macOS
    needs: quality
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Apple signing and notarization credentials
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          API_KEY_DIR="$RUNNER_TEMP/apple-api-key"
          API_KEY_PATH="$API_KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/zorid-signing.keychain-db"

          mkdir -p "$API_KEY_DIR"
          node -e "require('fs').writeFileSync(process.argv[1], Buffer.from(process.env.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64, 'base64'))" "$CERTIFICATE_PATH"
          node -e "require('fs').writeFileSync(process.argv[1], Buffer.from(process.env.APP_STORE_CONNECT_API_KEY_BASE64, 'base64'))" "$API_KEY_PATH"

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APP_STORE_CONNECT_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APP_STORE_CONNECT_ISSUER_ID" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build desktop app
        run: pnpm --filter @zorid/desktop-app run build

      - name: Package macOS artifacts
        run: pnpm --filter @zorid/desktop-app exec electron-builder --mac dmg zip --universal --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          if-no-files-found: error

  release:
    name: Create Draft Release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.AppImage
            release-artifacts/*.deb
            release-artifacts/*.dmg
            release-artifacts/*.msi
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
