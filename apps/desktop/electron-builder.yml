appId: app.zorid.desktop
productName: Zorid
copyright: Copyright © 2026 Zorid
asar: true
npmRebuild: false
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  output: release
files:
  - out/**/*
  - package.json
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
win:
  target:
    - target: msi
      arch:
        - x64
    - target: zip
      arch:
        - x64
linux:
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
